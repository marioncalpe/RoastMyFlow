<div class="login-container">

  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-icon">🎵</div>
    <h1 class="logo-title">RoastMyFlow</h1>
    <p class="logo-subtitle">L'IA qui juge tes goûts musicaux</p>
  </div>

  <!-- Formulaire -->
  <div class="form-area">

    <label class="input-label">Ton pseudo Last.fm</label>

    <input
      type="text"
      class="username-input"
      placeholder="ex: johndoe"
      [(ngModel)]="username"
      (keyup.enter)="onSubmit()"
      [disabled]="isLoading"/>

    <!-- Message d'erreur -->
    <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

    <!-- Bouton submit -->
    <button
      class="submit-btn"
      (click)="onSubmit()"
      [disabled]="isLoading">
      <span *ngIf="!isLoading">Analyse mes goûts 🔥</span>
      <span *ngIf="isLoading">Chargement...</span>
    </button>

    <!-- Lien création compte -->
    <a href="https://www.last.fm/join" target="_blank" class="create-account">
      Pas de compte Last.fm ? Créer un compte gratuit →
    </a>

  </div>

  <p class="disclaimer">
    En continuant, tu acceptes de te faire juger sévèrement par une IA.
  </p>

</div>
